<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Açaí</title>
<style>
  body { font-family: Arial, sans-serif; padding: 20px; max-width: 400px; margin: auto; }
  .seccao { margin-bottom: 20px; padding: 15px; border: 1px solid #ccc; border-radius: 8px; }
  h3 { margin-top: 0; font-size: 18px; }
  .subtitulo-categoria { margin-top: 15px; margin-bottom: 10px; font-weight: normal; color: #555; font-size: 16px; text-transform: uppercase; }
  label { display: block; margin-bottom: 10px; font-size: 16px; }
  input[type="text"], input[type="password"], input[type="number"] { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; margin-bottom: 10px; }
  button { width: 100%; padding: 15px; background-color: #4CAF50; color: white; border: none; border-radius: 8px; font-size: 18px; margin-bottom: 10px; cursor: pointer; }
  .btn-secundario { background-color: #607d8b; }
  .btn-sair { background-color: #f44336; padding: 10px; font-size: 16px; margin-top: 10px; margin-bottom: 0; }
  .btn-adicionar { background-color: #ff9800; }
  #ecran-app, #ecran-revisao, #ecran-pagamento { display: none; }
  
  .grelha-toppings { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .topping-label { display: block; margin: 0; cursor: pointer; }
  .topping-label input { display: none; }
  .topping-card { border: 2px solid #ddd; border-radius: 8px; padding: 10px; text-align: center; transition: all 0.2s; min-height: 145px; box-sizing: border-box; }
  .topping-card img { width: 100%; height: 80px; object-fit: cover; border-radius: 4px; margin-bottom: 8px; }
  .controlo-dose { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; width: 100%; }
  .btn-dose { background-color: #eee; border-radius: 4px; min-width: 28px; height: 28px; display: flex; justify-content: center; align-items: center; font-size: 20px; cursor: pointer; color: #333; line-height: 1; user-select: none; }
  .nome-topping { font-size: 13px; text-align: center; flex-grow: 1; padding: 0 4px; line-height: 1.2; word-wrap: break-word; }
  .topping-label input:checked + .topping-card { border-color: #4CAF50; background-color: #e8f5e9; }

  .ticket-etiqueta { font-family: 'Courier New', Courier, monospace; background-color: #fff; border: 1px solid #000; width: 250px; height: 150px; overflow: hidden; margin-bottom: 20px; color: #000; text-align: center; padding: 10px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: flex-start; }
  .ticket-obrigado { font-size: 14px; text-transform: uppercase; margin-bottom: 2px; }
  .ticket-separador { font-size: 12px; letter-spacing: 2px; margin: 4px 0; overflow: hidden; white-space: nowrap; }
  .ticket-tamanho { font-size: 14px; text-transform: uppercase; margin-bottom: 2px; }
  .ticket-toppings { font-size: 12px; text-align: left; line-height: 1.2; padding-left: 10px; }
  
  .item-carrinho { border: 1px solid #ddd; border-radius: 8px; padding: 15px; margin-bottom: 15px; background-color: #f9f9f9; }
  .item-cabecalho { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .item-titulo { font-size: 16px; font-weight: normal; color: #333; margin: 0; }
  .btn-remover { background-color: #f44336; color: white; border: none; border-radius: 4px; width: 32px; height: 32px; font-size: 20px; display: flex; justify-content: center; align-items: center; cursor: pointer; padding: 0; margin-bottom: 0; }
  .item-toppings { font-size: 14px; color: #666; margin-bottom: 15px; }
  .resumo-rodape { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
  .contador-carrinho { font-size: 16px; color: #333; }
  
  .bloco-pagamento { padding: 15px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 15px; background-color: #fff; }
  .titulo-pagamento { font-size: 18px; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
  .valor-destaque { font-size: 24px; color: #4CAF50; text-align: right; margin-bottom: 15px; }
  .calculadora-troco { background-color: #e3f2fd; padding: 15px; border-radius: 8px; margin-top: 10px; display: none; }
  .valor-troco { font-size: 20px; font-weight: normal; color: #d32f2f; margin-top: 10px; }
</style>
</head>
<body>

<div id="ecran-login" class="seccao">
  <h3>Login de Funcionário</h3>
  <input type="text" id="usuario" placeholder="Utilizador">
  <input type="password" id="palavra-passe" placeholder="Palavra-passe">
  <button onclick="fazerLogin()">Entrar</button>
</div>

<div id="ecran-app">
  <div id="ecran-pedido">
    <div class="seccao">
      <p style="margin-top: 0; margin-bottom: 0;">Ligado como: <span id="nome-operador"></span></p>
      <button class="btn-sair" onclick="terminarSessao()">Terminar Sessão</button>
    </div>

    <div class="seccao">
      <h3>Escolhe o Artigo</h3>
      <label><input type="radio" name="artigo" value="Acai Pequeno"> Açaí Pequeno (6.00€)</label>
      <label><input type="radio" name="artigo" value="Acai Medio"> Açaí Médio (7.50€)</label>
      <label><input type="radio" name="artigo" value="Acai Grande"> Açaí Grande (9.50€)</label>
    </div>

    <div class="seccao">
      <h3>Escolhe os Toppings</h3>
      
      <div class="subtitulo-categoria">Molhos</div>
      <div class="grelha-toppings" style="margin-bottom: 20px;">
        <label class="topping-label">
          <input type="checkbox" name="topping" value="Leite Condensado" data-dose="0" onchange="limparDose(this)">
          <div class="topping-card">
            <img src="leitec.png" alt="Leite Condensado">
            <div class="controlo-dose">
              <span class="btn-dose" onclick="alterarDose(event, this, -1)">-</span>
              <span class="nome-topping" data-texto="Leite Cond.">Leite Cond.</span>
              <span class="btn-dose" onclick="alterarDose(event, this, 1)">+</span>
            </div>
          </div>
        </label>

        <label class="topping-label">
          <input type="checkbox" name="topping" value="Mel" data-dose="0" onchange="limparDose(this)">
          <div class="topping-card">
            <img src="mel.png" alt="Mel">
            <div class="controlo-dose">
              <span class="btn-dose" onclick="alterarDose(event, this, -1)">-</span>
              <span class="nome-topping" data-texto="Mel">Mel</span>
              <span class="btn-dose" onclick="alterarDose(event, this, 1)">+</span>
            </div>
          </div>
        </label>

        <label class="topping-label">
          <input type="checkbox" name="topping" value="Manteiga Amendoim" data-dose="0" onchange="limparDose(this)">
          <div class="topping-card">
            <img src="manteiga.png" alt="Manteiga Amendoim">
            <div class="controlo-dose">
              <span class="btn-dose" onclick="alterarDose(event, this, -1)">-</span>
              <span class="nome-topping" data-texto="Manteiga A.">Manteiga A.</span>
              <span class="btn-dose" onclick="alterarDose(event, this, 1)">+</span>
            </div>
          </div>
        </label>

        <label class="topping-label">
          <input type="checkbox" name="topping" value="Chocolate" data-dose="0" onchange="limparDose(this)">
          <div class="topping-card">
            <img src="chocolate.png" alt="Chocolate">
            <div class="controlo-dose">
              <span class="btn-dose" onclick="alterarDose(event, this, -1)">-</span>
              <span class="nome-topping" data-texto="Chocolate">Chocolate</span>
              <span class="btn-dose" onclick="alterarDose(event, this, 1)">+</span>
            </div>
          </div>
        </label>
      </div>

      <div class="subtitulo-categoria">Crocantes</div>
      <div class="grelha-toppings" style="margin-bottom: 20px;">
        <label class="topping-label">
          <input type="checkbox" name="topping" value="Granola" data-dose="0" onchange="limparDose(this)">
          <div class="topping-card">
            <img src="granola.png" alt="Granola">
            <div class="controlo-dose">
              <span class="btn-dose" onclick="alterarDose(event, this, -1)">-</span>
              <span class="nome-topping" data-texto="Granola">Granola</span>
              <span class="btn-dose" onclick="alterarDose(event, this, 1)">+</span>
            </div>
          </div>
        </label>

        <label class="topping-label">
          <input type="checkbox" name="topping" value="Oreo" data-dose="0" onchange="limparDose(this)">
          <div class="topping-card">
            <img src="oreo.png" alt="Oreo">
            <div class="controlo-dose">
              <span class="btn-dose" onclick="alterarDose(event, this, -1)">-</span>
              <span class="nome-topping" data-texto="Oreo">Oreo</span>
              <span class="btn-dose" onclick="alterarDose(event, this, 1)">+</span>
            </div>
          </div>
        </label>

        <label class="topping-label">
          <input type="checkbox" name="topping" value="Paçoca" data-dose="0" onchange="limparDose(this)">
          <div class="topping-card">
            <img src="pacoca.png" alt="Paçoca">
            <div class="controlo-dose">
              <span class="btn-dose" onclick="alterarDose(event, this, -1)">-</span>
              <span class="nome-topping" data-texto="Paçoca">Paçoca</span>
              <span class="btn-dose" onclick="alterarDose(event, this, 1)">+</span>
            </div>
          </div>
        </label>

        <label class="topping-label">
          <input type="checkbox" name="topping" value="Leite em Po" data-dose="0" onchange="limparDose(this)">
          <div class="topping-card">
            <img src="leitep.png" alt="Leite em Pó">
            <div class="controlo-dose">
              <span class="btn-dose" onclick="alterarDose(event, this, -1)">-</span>
              <span class="nome-topping" data-texto="Leite em Pó">Leite em Pó</span>
              <span class="btn-dose" onclick="alterarDose(event, this, 1)">+</span>
            </div>
          </div>
        </label>
      </div>

      <div class="subtitulo-categoria">Fruta</div>
      <div class="grelha-toppings">
        <label class="topping-label">
          <input type="checkbox" name="topping" value="Banana" data-dose="0" onchange="limparDose(this)">
          <div class="topping-card">
            <img src="banana.png" alt="Banana">
            <div class="controlo-dose">
              <span class="btn-dose" onclick="alterarDose(event, this, -1)">-</span>
              <span class="nome-topping" data-texto="Banana">Banana</span>
              <span class="btn-dose" onclick="alterarDose(event, this, 1)">+</span>
            </div>
          </div>
        </label>

        <label class="topping-label">
          <input type="checkbox" name="topping" value="Morango" data-dose="0" onchange="limparDose(this)">
          <div class="topping-card">
            <img src="morango.png" alt="Morango">
            <div class="controlo-dose">
              <span class="btn-dose" onclick="alterarDose(event, this, -1)">-</span>
              <span class="nome-topping" data-texto="Morango">Morango</span>
              <span class="btn-dose" onclick="alterarDose(event, this, 1)">+</span>
            </div>
          </div>
        </label>
      </div>
    </div>

    <button class="btn-adicionar" onclick="adicionarAoCarrinho()">Adicionar ao Pedido</button>
    <button id="btn-duplicar" class="btn-secundario" style="display: none;" onclick="copiarUltimoCopo()">Copiar Último Copo</button>
    
    <div class="resumo-rodape">
      <span class="contador-carrinho" id="texto-contador">0 copos no pedido</span>
    </div>

    <button onclick="irParaRevisao()">Avançar para Revisão</button>
  </div>

  <div id="ecran-revisao">
    <div class="seccao">
      <button class="btn-secundario" onclick="voltarAoPedido()">Voltar ao Pedido</button>
    </div>

    <div class="seccao">
      <h3>Revisão de Pedido e Nomes</h3>
      <p>Confere os copos e escreve o nome do cliente em cada um.</p>
    </div>

    <div id="lista-revisao"></div>

    <div class="seccao">
      <h3>Pré-visualização das Etiquetas</h3>
      <div id="ticket-preview" style="display: flex; flex-direction: column; align-items: center;"></div>
    </div>

    <button onclick="irParaPagamento()">Avançar para Pagamento</button>
  </div>

  <div id="ecran-pagamento">
    <div class="seccao">
      <button class="btn-secundario" onclick="voltarARevisao()">Voltar à Revisão</button>
    </div>

    <div class="seccao">
      <h3>Tipo de Pagamento</h3>
      <label><input type="radio" name="tipo_conta" value="unica" checked onchange="atualizarInterfacePagamento()"> Conta Única (Um pagamento para tudo)</label>
      <label><input type="radio" name="tipo_conta" value="separada" onchange="atualizarInterfacePagamento()"> Contas Separadas (Cada um paga o seu)</label>
    </div>

    <div id="area-pagamento-global" style="display: none;">
      <div class="bloco-pagamento">
        <div class="titulo-pagamento">Pagamento Total</div>
        <div class="valor-destaque" id="valor-total-global">0.00 €</div>
        
        <label><input type="radio" name="pag_global" value="MBWay" onchange="verificarDinheiroGlobal(this.value)"> MBWay</label>
        <label><input type="radio" name="pag_global" value="Dinheiro" onchange="verificarDinheiroGlobal(this.value)"> Dinheiro</label>
        <label><input type="radio" name="pag_global" value="SumUp" onchange="verificarDinheiroGlobal(this.value)"> SumUp</label>
        
        <div id="calculadora-global" class="calculadora-troco">
          <label>Valor Entregue (€):</label>
          <input type="number" id="recebido-global" step="0.01" oninput="calcularTrocoGlobal()">
          <div class="valor-troco" id="troco-global">Troco: 0.00 €</div>
        </div>
      </div>
    </div>

    <div id="area-pagamento-separado" style="display: none;">
    </div>

    <button onclick="registarVenda()">Imprimir Tickets e Gravar Venda</button>
  </div>
</div>

<script>
  const urlScript = "https://script.google.com/macros/s/AKfycbydfxS5wia2mq_BihJkp3uIm-wWh0KN1V865tDyh3AOL274z8WmhX6RrfQttfEbRbgtqA/exec";
  let funcionarioLogado = "";
  let carrinho = [];

  const precosTamanhos = {
    "Acai Pequeno": 6.00,
    "Acai Medio": 7.50,
    "Acai Grande": 9.50
  };

  const utilizadoresValidos = {
    "eryk": "1234",
    "funcionario1": "5678"
  };

  window.onload = function() {
    verificarSessao();
  };

  function verificarSessao() {
    const sessaoGuardada = localStorage.getItem('funcionarioLogado');
    if (sessaoGuardada) {
      funcionarioLogado = sessaoGuardada;
      document.getElementById("nome-operador").innerText = funcionarioLogado;
      document.getElementById("ecran-login").style.display = "none";
      document.getElementById("ecran-app").style.display = "block";
      document.getElementById("ecran-pedido").style.display = "block";
    }
  }

  function fazerLogin() {
    const user = document.getElementById("usuario").value;
    const pass = document.getElementById("palavra-passe").value;

    if (utilizadoresValidos[user] && utilizadoresValidos[user] === pass) {
      funcionarioLogado = user;
      localStorage.setItem('funcionarioLogado', user);
      document.getElementById("nome-operador").innerText = user;
      document.getElementById("ecran-login").style.display = "none";
      document.getElementById("ecran-app").style.display = "block";
      document.getElementById("ecran-pedido").style.display = "block";
    } else {
      alert("Utilizador ou palavra-passe incorretos.");
    }
  }

  function terminarSessao() {
    localStorage.removeItem('funcionarioLogado');
    funcionarioLogado = "";
    carrinho = [];
    atualizarContador();
    document.getElementById("ecran-app").style.display = "none";
    document.getElementById("ecran-pedido").style.display = "none";
    document.getElementById("ecran-revisao").style.display = "none";
    document.getElementById("ecran-pagamento").style.display = "none";
    document.getElementById("ecran-login").style.display = "block";
    document.getElementById("usuario").value = "";
    document.getElementById("palavra-passe").value = "";
  }

  function alterarDose(evento, elemento, direcao) {
    evento.preventDefault();
    evento.stopPropagation();
    
    const cartao = elemento.closest('.topping-label');
    const checkbox = cartao.querySelector('input[type="checkbox"]');
    const textoLabel = cartao.querySelector('.nome-topping');
    const textoOriginal = textoLabel.getAttribute('data-texto');
    
    let dose = parseInt(checkbox.getAttribute('data-dose')) || 0;
    
    if (direcao === 1) {
      dose = dose < 1 ? dose + 1 : 1;
    } else {
      dose = dose > -1 ? dose - 1 : -1;
    }
    
    checkbox.setAttribute('data-dose', dose);
    
    if (!checkbox.checked) {
      checkbox.checked = true;
    }
    
    if (dose === 1) {
      textoLabel.innerText = "Mais " + textoOriginal;
    } else if (dose === -1) {
      textoLabel.innerText = "Menos " + textoOriginal;
    } else {
      textoLabel.innerText = textoOriginal;
    }
  }

  function limparDose(checkbox) {
    if (!checkbox.checked) {
      checkbox.setAttribute('data-dose', '0');
      const textoLabel = checkbox.closest('.topping-label').querySelector('.nome-topping');
      textoLabel.innerText = textoLabel.getAttribute('data-texto');
    }
  }

  function adicionarAoCarrinho() {
    const artigoSelecionado = document.querySelector('input[name="artigo"]:checked');
    if (!artigoSelecionado) {
      alert("Por favor, escolhe primeiro o tamanho do açaí.");
      return;
    }
    
    const artigo = artigoSelecionado.value;
    const preco = precosTamanhos[artigo] || 0;
    const checkboxes = document.querySelectorAll('input[name="topping"]:checked');
    let listaToppingsTexto = [];
    let listaToppingsRaw = [];
    
    for (let i = 0; i < checkboxes.length; i++) {
      const dose = parseInt(checkboxes[i].getAttribute('data-dose')) || 0;
      const nome = checkboxes[i].value;
      
      listaToppingsRaw.push({nome: nome, dose: dose});
      
      if (dose === 1) {
        listaToppingsTexto.push("Mais " + nome);
      } else if (dose === -1) {
        listaToppingsTexto.push("Menos " + nome);
      } else {
        listaToppingsTexto.push(nome);
      }
    }
    
    const novoCopo = {
      id: Date.now() + Math.random(),
      artigo: artigo,
      preco: preco,
      cliente: "",
      toppingsTexto: listaToppingsTexto.join(", "),
      toppingsRaw: listaToppingsRaw
    };
    
    carrinho.push(novoCopo);
    atualizarContador();
    limparFormularioPedido();
  }

  function copiarUltimoCopo() {
    if (carrinho.length === 0) return;
    
    limparFormularioPedido();
    
    const ultimoCopo = carrinho[carrinho.length - 1];
    
    const radioArtigo = document.querySelector(`input[name="artigo"][value="${ultimoCopo.artigo}"]`);
    if(radioArtigo) radioArtigo.checked = true;
    
    if (ultimoCopo.toppingsRaw) {
      for (let i = 0; i < ultimoCopo.toppingsRaw.length; i++) {
        const toppingRaw = ultimoCopo.toppingsRaw[i];
        const checkbox = document.querySelector(`input[name="topping"][value="${toppingRaw.nome}"]`);
        if (checkbox) {
          checkbox.checked = true;
          checkbox.setAttribute('data-dose', toppingRaw.dose);
          const textoLabel = checkbox.closest('.topping-label').querySelector('.nome-topping');
          const textoOriginal = textoLabel.getAttribute('data-texto');
          if (toppingRaw.dose === 1) {
            textoLabel.innerText = "Mais " + textoOriginal;
          } else if (toppingRaw.dose === -1) {
            textoLabel.innerText = "Menos " + textoOriginal;
          } else {
            textoLabel.innerText = textoOriginal;
          }
        }
      }
    }
  }

  function atualizarContador() {
    const texto = carrinho.length === 1 ? "1 copo no pedido" : carrinho.length + " copos no pedido";
    document.getElementById("texto-contador").innerText = texto;
    
    const btnDuplicar = document.getElementById("btn-duplicar");
    if (carrinho.length > 0) {
      btnDuplicar.style.display = "block";
    } else {
      btnDuplicar.style.display = "none";
    }
  }

  function limparFormularioPedido() {
    const artigoSelecionado = document.querySelector('input[name="artigo"]:checked');
    if(artigoSelecionado) artigoSelecionado.checked = false;
    const checkboxes = document.querySelectorAll('input[name="topping"]:checked');
    for (let i = 0; i < checkboxes.length; i++) {
      checkboxes[i].checked = false;
      limparDose(checkboxes[i]);
    }
  }

  function irParaRevisao() {
    if (carrinho.length === 0) {
      alert("Não tens nenhum copo no pedido. Adiciona pelo menos um para avançar.");
      return;
    }
    document.getElementById("ecran-pedido").style.display = "none";
    document.getElementById("ecran-revisao").style.display = "block";
    atualizarInterfaceRevisao();
  }

  function voltarAoPedido() {
    document.getElementById("ecran-revisao").style.display = "none";
    document.getElementById("ecran-pedido").style.display = "block";
  }

  function voltarARevisao() {
    document.getElementById("ecran-pagamento").style.display = "none";
    document.getElementById("ecran-revisao").style.display = "block";
  }

  function atualizarNomeCopo(index, valor) {
    carrinho[index].cliente = valor.toUpperCase();
  }

  function removerDoCarrinho(index) {
    carrinho.splice(index, 1);
    atualizarContador();
    
    if (carrinho.length === 0) {
      voltarAoPedido();
      return;
    }
    
    atualizarInterfaceRevisao();
  }

  function atualizarInterfaceRevisao() {
    const listaContainer = document.getElementById("lista-revisao");
    let htmlLista = "";
    
    for (let i = 0; i < carrinho.length; i++) {
      const copo = carrinho[i];
      const nomeValue = copo.cliente || "";
      
      htmlLista += `
        <div class="item-carrinho">
          <div class="item-cabecalho">
            <div class="item-titulo">Copo ${i + 1}: ${copo.artigo}</div>
            <button class="btn-remover" onclick="removerDoCarrinho(${i})">-</button>
          </div>
          <div class="item-toppings">${copo.toppingsTexto || "Sem toppings"}</div>
          <input type="text" id="nome-cliente-${i}" placeholder="NOME PARA ESTE COPO" value="${nomeValue}" style="text-transform: uppercase;" oninput="this.value = this.value.toUpperCase(); atualizarNomeCopo(${i}, this.value); atualizarTicket()">
        </div>
      `;
    }
    
    listaContainer.innerHTML = htmlLista;
    atualizarTicket();
  }

  function atualizarTicket() {
    let previewContainer = document.getElementById("ticket-preview");
    previewContainer.innerHTML = "";
    
    for (let i = 0; i < carrinho.length; i++) {
      const copo = carrinho[i];
      const nomeCliente = copo.cliente ? copo.cliente : "A AGUARDAR...";
      
      let toppingsTicketHTML = "";
      if (copo.toppingsRaw && copo.toppingsRaw.length > 0) {
        for (let j = 0; j < copo.toppingsRaw.length; j++) {
          const tr = copo.toppingsRaw[j];
          if (tr.dose === 1) {
            toppingsTicketHTML += "+ " + tr.nome + "<br>";
          } else if (tr.dose === -1) {
            toppingsTicketHTML += "- " + tr.nome + "<br>";
          } else {
            toppingsTicketHTML += tr.nome + "<br>";
          }
        }
      } else {
        toppingsTicketHTML = "SEM TOPPINGS<br>";
      }
      
      let ticketHTML = `
        <div class="ticket-etiqueta">
          <div class="ticket-obrigado">OBRIGADO ${nomeCliente}</div>
          <div class="ticket-separador">- - - - - - - - - - - - - -</div>
          <div class="ticket-tamanho">${copo.artigo}</div>
          <div class="ticket-separador">- - - - - - - - - - - - - -</div>
          <div class="ticket-toppings">
            ${toppingsTicketHTML}
          </div>
        </div>
      `;
      previewContainer.innerHTML += ticketHTML;
    }
  }

  function irParaPagamento() {
    for (let i = 0; i < carrinho.length; i++) {
      if (!carrinho[i].cliente || carrinho[i].cliente.trim() === "") {
        alert(`Por favor, escreve o nome para o Copo ${i + 1} antes de avançares.`);
        return;
      }
    }
    document.getElementById("ecran-revisao").style.display = "none";
    document.getElementById("ecran-pagamento").style.display = "block";
    atualizarInterfacePagamento();
  }

  function atualizarInterfacePagamento() {
    const tipoConta = document.querySelector('input[name="tipo_conta"]:checked').value;
    const areaGlobal = document.getElementById("area-pagamento-global");
    const areaSeparada = document.getElementById("area-pagamento-separado");
    
    let totalGlobal = 0;
    carrinho.forEach(copo => totalGlobal += copo.preco);
    
    if (tipoConta === "unica") {
      areaSeparada.style.display = "none";
      areaGlobal.style.display = "block";
      document.getElementById("valor-total-global").innerText = totalGlobal.toFixed(2) + " €";
      document.getElementById("recebido-global").value = "";
      document.getElementById("troco-global").innerText = "Troco: 0.00 €";
      const radiosGlobais = document.querySelectorAll('input[name="pag_global"]');
      radiosGlobais.forEach(radio => radio.checked = false);
      document.getElementById("calculadora-global").style.display = "none";
    } else {
      areaGlobal.style.display = "none";
      areaSeparada.style.display = "block";
      
      let htmlSeparado = "";
      for (let i = 0; i < carrinho.length; i++) {
        const copo = carrinho[i];
        htmlSeparado += `
          <div class="bloco-pagamento">
            <div class="titulo-pagamento">Copo ${i + 1}: ${copo.cliente}</div>
            <div class="valor-destaque">${copo.preco.toFixed(2)} €</div>
            <div style="margin-bottom: 10px;">
              <label style="font-size: 14px;"><input type="radio" name="pag_item_${i}" value="MBWay" onchange="verificarDinheiroSeparado(${i}, this.value)"> MBWay</label>
              <label style="font-size: 14px;"><input type="radio" name="pag_item_${i}" value="Dinheiro" onchange="verificarDinheiroSeparado(${i}, this.value)"> Dinheiro</label>
              <label style="font-size: 14px;"><input type="radio" name="pag_item_${i}" value="SumUp" onchange="verificarDinheiroSeparado(${i}, this.value)"> SumUp</label>
            </div>
            <div id="calculadora-item-${i}" class="calculadora-troco">
              <label>Valor Entregue (€):</label>
              <input type="number" id="recebido-item-${i}" step="0.01" oninput="calcularTrocoSeparado(${i}, ${copo.preco})">
              <div class="valor-troco" id="troco-item-${i}">Troco: 0.00 €</div>
            </div>
          </div>
        `;
      }
      areaSeparada.innerHTML = htmlSeparado;
    }
  }

  function verificarDinheiroGlobal(metodo) {
    const calculadora = document.getElementById("calculadora-global");
    if (metodo === "Dinheiro") {
      calculadora.style.display = "block";
    } else {
      calculadora.style.display = "none";
    }
  }

  function calcularTrocoGlobal() {
    let totalGlobal = 0;
    carrinho.forEach(copo => totalGlobal += copo.preco);
    const valorRecebido = parseFloat(document.getElementById("recebido-global").value) || 0;
    let troco = valorRecebido - totalGlobal;
    if (troco < 0) troco = 0;
    document.getElementById("troco-global").innerText = "Troco: " + troco.toFixed(2) + " €";
  }

  function verificarDinheiroSeparado(index, metodo) {
    const calculadora = document.getElementById(`calculadora-item-${index}`);
    if (metodo === "Dinheiro") {
      calculadora.style.display = "block";
    } else {
      calculadora.style.display = "none";
    }
  }

  function calcularTrocoSeparado(index, preco) {
    const valorRecebido = parseFloat(document.getElementById(`recebido-item-${index}`).value) || 0;
    let troco = valorRecebido - preco;
    if (troco < 0) troco = 0;
    document.getElementById(`troco-item-${index}`).innerText = "Troco: " + troco.toFixed(2) + " €";
  }

  function registarVenda() {
    const tipoConta = document.querySelector('input[name="tipo_conta"]:checked').value;
    let pagamentos = [];
    
    if (tipoConta === "unica") {
      const pagamentoGlobal = document.querySelector('input[name="pag_global"]:checked');
      if (!pagamentoGlobal) {
        alert("Por favor, escolhe o método de pagamento para concluir a venda.");
        return;
      }
      for (let i = 0; i < carrinho.length; i++) {
        pagamentos.push(pagamentoGlobal.value);
      }
    } else {
      for (let i = 0; i < carrinho.length; i++) {
        const pagamentoItem = document.querySelector(`input[name="pag_item_${i}"]:checked`);
        if (!pagamentoItem) {
          alert(`Por favor, escolhe o método de pagamento para o Copo ${i + 1} de ${carrinho[i].cliente}.`);
          return;
        }
        pagamentos.push(pagamentoItem.value);
      }
    }

    const agora = new Date();
    const dataVenda = agora.toLocaleDateString('pt-PT');
    const horaVenda = agora.getHours().toString().padStart(2, '0') + ':' +
                      agora.getMinutes().toString().padStart(2, '0') + ':' +
                      agora.getSeconds().toString().padStart(2, '0');

    for (let i = 0; i < carrinho.length; i++) {
      const dadosCopo = {
        data: dataVenda,
        hora: horaVenda,
        artigo: carrinho[i].artigo,
        toppings: carrinho[i].toppingsTexto,
        pagamento: pagamentos[i],
        cliente: carrinho[i].cliente,
        funcionario: funcionarioLogado
      };

      if (navigator.onLine) {
        enviarParaExcel(dadosCopo);
      } else {
        guardarLocalmente(dadosCopo);
      }
    }

    alert("Pedido registado com sucesso e enviado para impressão!");
    carrinho = [];
    atualizarContador();
    
    document.getElementById("ecran-pagamento").style.display = "none";
    document.getElementById("ecran-pedido").style.display = "block";
  }

  function enviarParaExcel(dados) {
    fetch(urlScript, {
      method: "POST",
      mode: "no-cors",
      cache: "no-cache",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(dados)
    }).catch((erro) => {
      console.log("Erro de rede. Guardado localmente.");
      guardarLocalmente(dados);
    });
  }

  function guardarLocalmente(dados) {
    let vendasPendentes = localStorage.getItem('vendasAtrasadas');
    if (vendasPendentes) {
      vendasPendentes = JSON.parse(vendasPendentes);
    } else {
      vendasPendentes = [];
    }
    vendasPendentes.push(dados);
    localStorage.setItem('vendasAtrasadas', JSON.stringify(vendasPendentes));
  }

  function sincronizarVendasAtrasadas() {
    if (navigator.onLine) {
      let vendasPendentes = localStorage.getItem('vendasAtrasadas');
      if (vendasPendentes) {
        vendasPendentes = JSON.parse(vendasPendentes);
        if (vendasPendentes.length > 0) {
          const vendaAtual = vendasPendentes[0];
          fetch(urlScript, {
            method: "POST",
            mode: "no-cors",
            cache: "no-cache",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify(vendaAtual)
          }).then(() => {
            vendasPendentes.shift();
            localStorage.setItem('vendasAtrasadas', JSON.stringify(vendasPendentes));
            sincronizarVendasAtrasadas();
          }).catch(() => {});
        }
      }
    }
  }

  window.addEventListener('online', sincronizarVendasAtrasadas);
  setInterval(sincronizarVendasAtrasadas, 30000);
</script>
